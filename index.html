<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maciej Hebel | Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --bg2: #111115;
    --bg3: #18181f;
    --surface: #1c1c24;
    --border: rgba(255,255,255,0.06);
    --accent: #10b981;
    --accent2: #059669;
    --text: #f0ede8;
    --muted: #888896;
    --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  }

  * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    cursor: none;
  }

  /* CUSTOM CURSOR */
  .cursor {
    position: fixed;
    top: 0; left: 0;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, width 0.25s, height 0.25s, background 0.25s;
    mix-blend-mode: difference;
  }
  .cursor-ring {
    position: fixed;
    top: 0; left: 0;
    width: 36px; height: 36px;
    border: 1px solid rgba(16,185,129,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.18s ease, width 0.3s, height 0.3s, border-color 0.3s;
  }
  .cursor.hovering { width: 18px; height: 18px; }
  .cursor-ring.hovering { width: 60px; height: 60px; border-color: var(--accent); }

  /* GRAIN OVERLAY */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: var(--grain);
    background-size: 128px 128px;
    pointer-events: none;
    z-index: 100;
    opacity: 0.65;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    padding: 22px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, rgba(10,10,12,0.95) 0%, transparent 100%);
    backdrop-filter: blur(0px);
  }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.82rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--text); }
  @media(max-width:640px) {
    nav { padding: 18px 24px; }
    .nav-links { display: none; }
  }

  /* HERO / ABOUT */
  #about {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 120px 48px 80px;
    position: relative;
    overflow: hidden;
  }
  .hero-bg-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: var(--border);
  }
  .hero-bg-line:nth-child(1) { left: 25%; }
  .hero-bg-line:nth-child(2) { left: 50%; }
  .hero-bg-line:nth-child(3) { left: 75%; }

  .hero-glow {
    position: absolute;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(16,185,129,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .about-inner {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    align-items: center;
  }

  .about-text { }
  .about-eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
  }
  .about-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 7vw, 7rem);
    line-height: 0.95;
    letter-spacing: 0.02em;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.8s 0.35s forwards;
  }
  .about-name span {
    display: block;
    background: linear-gradient(135deg, var(--text) 40%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .about-role {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    color: var(--muted);
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.8s 0.5s forwards;
  }
  .about-desc {
    font-size: 1rem;
    line-height: 1.8;
    color: rgba(240,237,232,0.7);
    max-width: 480px;
    opacity: 0;
    animation: fadeUp 0.8s 0.65s forwards;
	text-align: justify;
  }

  .about-photos {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 12px;
    opacity: 0;
    animation: fadeIn 1s 0.8s forwards;
  }
  .photo-card {
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
  }
  .photo-card:first-child {
    grid-column: 1 / -1;
    aspect-ratio: 16 / 9;
    height: auto;
  }
  .photo-card:not(:first-child) {
    aspect-ratio: 9 / 16;
    height: auto;
  }
  .photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(20%) brightness(0.85);
    transition: filter 0.4s, transform 0.5s;
  }
  .photo-card:hover img { filter: grayscale(0%) brightness(1); transform: scale(1.04); }
  .photo-card-label {
    position: absolute;
    bottom: 12px; left: 12px;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: rgba(10,10,12,0.75);
    padding: 4px 10px;
    border-radius: 2px;
    color: var(--muted);
  }

  @media(max-width: 900px) {
    .about-inner {
      grid-template-columns: 1fr;
      gap: 48px;
    }
    .about-photos { grid-template-columns: 1fr 1fr; }
    .photo-card:first-child { aspect-ratio: 16 / 9; }
    .photo-card:not(:first-child) { aspect-ratio: 9 / 16; }
    #about { padding: 110px 24px 70px; }
  }

  /* DIVIDER */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 0 48px;
    margin-bottom: 64px;
  }
  .section-divider hr {
    flex: 1;
    border: none;
    border-top: 1px solid var(--border);
  }
  .section-divider-label {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    white-space: nowrap;
  }
  @media(max-width:640px) {
    .section-divider { padding: 0 24px; }
  }

  /* PORTFOLIO GRID */
  #portfolio {
    padding: 0 48px 100px;
  }
  .portfolio-header {
    max-width: 1200px;
    margin: 0 auto 56px;
  }
  .portfolio-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 5vw, 5rem);
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .portfolio-header p {
    color: var(--muted);
    margin-top: 12px;
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .video-grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
  }
  @media(max-width: 760px) {
    .video-grid { grid-template-columns: 1fr; }
    #portfolio { padding: 0 24px 80px; }
    .portfolio-header { margin-bottom: 40px; }
  }

  .video-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.35s, transform 0.35s, box-shadow 0.35s;
    opacity: 0;
    transform: translateY(28px);
  }
  .video-card.visible {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.35s, box-shadow 0.35s;
  }
  .video-card:hover {
    border-color: rgba(16,185,129,0.25);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(16,185,129,0.1);
  }

  .video-embed-wrap {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: #000;
  }
  .video-embed-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* TVP Card */
  .tvp-card-link {
    display: block;
    text-decoration: none;
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: linear-gradient(135deg, #0d1117 0%, #1a1f2e 100%);
    overflow: hidden;
  }
  .tvp-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  .tvp-logo-wrap {
    width: 72px; height: 72px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s, transform 0.3s;
  }
  .tvp-card-link:hover .tvp-logo-wrap {
    background: rgba(16,185,129,0.15);
    transform: scale(1.1);
  }
  .tvp-play-icon {
    width: 0; height: 0;
    border-style: solid;
    border-width: 14px 0 14px 26px;
    border-color: transparent transparent transparent var(--accent);
    margin-left: 5px;
  }
  .tvp-badge {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.2);
    padding: 4px 12px;
    border-radius: 20px;
  }
  .tvp-shine {
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.03) 50%, transparent 60%);
    transition: left 0.5s;
  }
  .tvp-card-link:hover .tvp-shine { left: 160%; }

  /* TikTok link card */
  .tiktok-card-link {
    display: block;
    text-decoration: none;
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: linear-gradient(135deg, #010101 0%, #1a0a14 100%);
    overflow: hidden;
  }
  .tiktok-card-link:hover .tvp-logo-wrap {
    background: rgba(16,185,129,0.15);
    transform: scale(1.1);
  }
  .tiktok-card-link:hover .tvp-shine { left: 160%; }
  .tiktok-platform-badge {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.2);
    padding: 4px 12px;
    border-radius: 20px;
  }

  .card-body {
    padding: 20px 22px 24px;
  }
  .card-title {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 1.1rem;
    margin-bottom: 8px;
    line-height: 1.3;
    color: var(--text);
  }
  .card-desc {
    font-size: 0.83rem;
    line-height: 1.65;
    color: var(--muted);
	text-align: justify;
  }
  .card-ext-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 10px;
  }
  .card-ext-badge svg { width: 10px; height: 10px; fill: none; stroke: currentColor; stroke-width: 2; }

  /* CONTACT */
  #contact {
    padding: 0 48px 120px;
  }
  .contact-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s, transform 0.7s;
  }
  .contact-inner.visible { opacity: 1; transform: none; }
  .contact-tagline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 6vw, 6rem);
    line-height: 0.95;
    letter-spacing: 0.03em;
  }
  .contact-tagline em {
    display: block;
    font-style: italic;
    font-family: 'DM Serif Display', serif;
    font-size: 0.55em;
    letter-spacing: 0;
    color: var(--muted);
    margin-top: 10px;
  }
  .contact-right { }
  .contact-right h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    margin-bottom: 16px;
  }
  .contact-right p {
    font-size: 0.95rem;
    line-height: 1.75;
    color: rgba(240,237,232,0.65);
    margin-bottom: 36px;
  }
  .btn-mailto {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 16px 36px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-radius: 3px;
    transition: background 0.3s, transform 0.25s, box-shadow 0.3s;
    position: relative;
    overflow: hidden;
  }
  .btn-mailto::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    transform: translateX(-110%);
    transition: transform 0.4s;
    skewX: -15deg;
  }
  .btn-mailto:hover::before { transform: translateX(110%); }
  .btn-mailto:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(16,185,129,0.3); }
  .btn-mailto svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }

  .contact-buttons { display: flex; flex-direction: column; gap: 12px; }
  .btn-copy {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 16px 36px;
    background: transparent;
    color: var(--accent);
    border: 1px solid rgba(16,185,129,0.35);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-radius: 3px;
    transition: background 0.3s, transform 0.25s, box-shadow 0.3s, border-color 0.3s;
    position: relative;
    overflow: hidden;
  }
  .btn-copy::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(16,185,129,0.06);
    transform: translateX(-110%);
    transition: transform 0.4s;
  }
  .btn-copy:hover::before { transform: translateX(110%); }
  .btn-copy:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(16,185,129,0.15); }
  .btn-copy.copied { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .btn-copy svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }

  @media(max-width:900px) {
    .contact-inner { grid-template-columns: 1fr; gap: 40px; }
    #contact { padding: 0 24px 80px; }
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 32px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.05em;
  }
  @media(max-width:640px) {
    footer { padding: 24px; flex-direction: column; gap: 10px; text-align: center; }
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- NAV -->
<nav>
  <a href="#" class="nav-logo" id="navLogo"></a>
  <ul class="nav-links">
    <li><a href="#about">O mnie</a></li>
    <li><a href="#portfolio">Realizacje</a></li>
    <li><a href="#contact">Kontakt</a></li>
  </ul>
</nav>

<!-- ABOUT -->
<section id="about">
  <div class="hero-bg-line"></div>
  <div class="hero-bg-line"></div>
  <div class="hero-bg-line"></div>
  <div class="hero-glow"></div>
  <div class="about-inner">
    <div class="about-text">
      <p class="about-eyebrow" id="aboutEyebrow"></p>
      <h1 class="about-name" id="aboutName"></h1>

</section>

<!-- DIVIDER -->

<!-- PORTFOLIO -->
<section id="portfolio">

</section>

<!-- DIVIDER -->
<div class="section-divider">
  <hr>
  <span class="section-divider-label">Kontakt</span>
  <hr>
</div>

<!-- CONTACT -->
<section id="contact">
  <div class="contact-inner" id="contactInner">
    <div class="contact-tagline" id="contactTagline"></div>
    <div class="contact-right">
      <h3 id="contactHeading"></h3>

      <div class="contact-buttons">

          <span id="copyEmailLabel">Kopiuj adres email</span>
        </button>
      </div>
    </div>
  </div>
</section>

<footer>
  <span id="footerName"></span>
  <span id="footerYear"></span>
</footer>

const ABOUT = {

};

const CONTACT = {
  tagline: "Zróbmy\ncoś\nrazem.",
  taglineItalic: "Napisz do mnie",
  heading: "Masz projekt? Porozmawiajmy.",
  description: "Jestem otwarty na współpracę przy produkcjach wideo, montażu, projektach dokumentalnych oraz treściach dla marek. Odpisuję w ciągu 24 godzin.",
  email: "maciejhebel1@gmail.com",
  btnLabel: "Napisz wiadomość"
};

/* ============================================================
   FILMY – dodawaj nowe obiekty do tej tablicy
   source: "youtube", "tvp" lub "tiktok"
   link: URL do YouTube, TVP VOD lub TikToka
   title: tytuł
   description: krótki opis
   ============================================================ */

const VIDEOS = [
  {
    source: "youtube",

/* ============================================================
   RENDER
   ============================================================ */

function getYouTubeId(url) {
  const match = url.match(/(?:v=|youtu\.be\/|embed\/)([^&?/]+)/);
  return match ? match[1] : null;
}

// Nav logo
document.getElementById('navLogo').textContent = `${ABOUT.firstName} ${ABOUT.lastName}`;

// About
document.getElementById('aboutEyebrow').textContent = ABOUT.eyebrow;
document.getElementById('aboutName').innerHTML = `<span>${ABOUT.firstName}</span><span>${ABOUT.lastName}</span>`;
document.getElementById('aboutRole').textContent = ABOUT.role;
document.getElementById('aboutDesc').textContent = ABOUT.description;

// Photos
const photosEl = document.getElementById('aboutPhotos');
ABOUT.photos.forEach(p => {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.innerHTML = `<img src="${p.src}" alt="${p.label}" loading="lazy"><span class="photo-card-label">${p.label}</span>`;
  photosEl.appendChild(card);
});

// Videos
const grid = document.getElementById('videoGrid');

VIDEOS.forEach((video, i) => {
  const card = document.createElement('div');
  card.className = 'video-card';
  card.style.transitionDelay = `${(i % 2) * 0.1}s`;

  if (video.source === 'youtube') {
    const ytId = getYouTubeId(video.link);
    const embedUrl = `https://www.youtube-nocookie.com/embed/${ytId}?rel=0&modestbranding=1`;
    card.innerHTML = `
      <div class="video-embed-wrap">
        <iframe src="${embedUrl}" allowfullscreen loading="lazy" title="${video.title}"></iframe>
      </div>
      <div class="card-body">
        <div class="card-title">${video.title}</div>
        <div class="card-desc">${video.description}</div>
      </div>
    `;
  } else if (video.source === 'tvp') {
    card.innerHTML = `
      <a class="tvp-card-link" href="${video.link}" target="_blank" rel="noopener noreferrer">
        <div class="tvp-inner">
          <div class="tvp-logo-wrap">
            <div class="tvp-play-icon"></div>
          </div>
          <span class="tvp-badge">TVP VOD</span>
        </div>
        <div class="tvp-shine"></div>
      </a>
      <div class="card-body">
        <div class="card-title">${video.title}</div>
        <div class="card-desc">${video.description}</div>
        <span class="card-ext-badge">
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Otworzy się w nowej karcie
        </span>
      </div>
    `;
  } else if (video.source === 'tiktok') {
    card.innerHTML = `
      <a class="tiktok-card-link" href="${video.link}" target="_blank" rel="noopener noreferrer">
        <div class="tvp-inner">
          <div class="tvp-logo-wrap">
            <div class="tvp-play-icon"></div>
          </div>
          <span class="tiktok-platform-badge">TikTok</span>
        </div>
        <div class="tvp-shine"></div>
      </a>
      <div class="card-body">
        <div class="card-title">${video.title}</div>
        <div class="card-desc">${video.description}</div>
        <span class="card-ext-badge">
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Otworzy się w nowej karcie
        </span>
      </div>
    `;
  }

  grid.appendChild(card);
});

// Contact
const taglineLines = CONTACT.tagline.split('\n');
const taglineEl = document.getElementById('contactTagline');
taglineLines.forEach(line => {
  const span = document.createElement('span');
  span.style.display = 'block';
  span.textContent = line;
  taglineEl.appendChild(span);
});
const emEl = document.createElement('em');
emEl.textContent = CONTACT.taglineItalic;
taglineEl.appendChild(emEl);

document.getElementById('contactHeading').textContent = CONTACT.heading;
document.getElementById('contactDesc').textContent = CONTACT.description;
const btn = document.getElementById('contactBtn');
btn.href = `mailto:${CONTACT.email}`;
btn.querySelector('#contactBtnLabel').textContent = CONTACT.btnLabel;

// Copy email button
const copyBtn = document.getElementById('copyEmailBtn');
const copyLabel = document.getElementById('copyEmailLabel');
copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(CONTACT.email).then(() => {
    copyLabel.textContent = 'Skopiowano';
    copyBtn.classList.add('copied');
    setTimeout(() => {
      copyLabel.textContent = 'Kopiuj adres email';
      copyBtn.classList.remove('copied');
    }, 2000);
  });
});

// Footer
document.getElementById('footerName').textContent = `© ${ABOUT.firstName} ${ABOUT.lastName}`;
document.getElementById('footerYear').textContent = new Date().getFullYear();

/* ============================================================
   INTERSECTION OBSERVER – scroll animations
   ============================================================ */

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.video-card, .contact-inner').forEach(el => observer.observe(el));

/* ============================================================
   CUSTOM CURSOR
   ============================================================ */

const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
});

function animateRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(animateRing);
}
animateRing();

document.querySelectorAll('a, button, .video-card, .photo-card').forEach(el => {
  el.addEventListener('mouseenter', () => { cursor.classList.add('hovering'); ring.classList.add('hovering'); });
  el.addEventListener('mouseleave', () => { cursor.classList.remove('hovering'); ring.classList.remove('hovering'); });
});

// Hide cursor on mobile
if ('ontouchstart' in window) {
  cursor.style.display = 'none';
  ring.style.display = 'none';
  document.body.style.cursor = 'auto';
}
</script>
